name: Build Executables

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install Pillow

    - name: Download word list
      # The app requires a words.txt file to be present at build time
      # We download a standard 466k word list from dwyl/english-words
      run: |
        curl -L -o words.txt https://raw.githubusercontent.com/dwyl/english-words/master/words_alpha.txt

    - name: Build with PyInstaller (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller main.pyw --onefile --windowed --name "Prefixr" --icon "icon.ico" --add-data "words.txt;." --add-data "icon.ico;." --add-data "prefixr;prefixr"

    - name: Build with PyInstaller (macOS / Linux)
      if: runner.os != 'Windows'
      run: |
        pyinstaller main.pyw --onefile --windowed --name "Prefixr" --icon "icon.ico" --add-data "words.txt:." --add-data "icon.ico:." --add-data "prefixr:prefixr"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Prefixr-${{ runner.os }}
        path: dist/
        retention-days: 7
